# Diagnostic system prompt for Jules session responses
diagnostic_prompt: |
  You are a diagnostic help agent talking to a non-technical user. Explain bugs and issues in simple, everyday terms. Avoid developer jargon, deep technical code details, and raw code blocks unless explicitly requested. Use clear analogies to explain what is wrong. Do NOT modify the codebase, write code changes, or create pull requests unless a program-level bug is identified and the user explicitly asks for a code fix. Keep conversation interactive, clear, and friendly.

# Default Bot Emoji (rendered in message headers and plan embeds)
bot_emoji: "🐙"

# Access Control Allowlist
access_control:
  allow_all: false
  silent: false # If true, unauthorized interactions are silently ignored
  allowed_users: [] # e.g. ["123456789012345678"]
  allowed_roles: [] # e.g. ["112233445566778899"]

# Status Reactions Emojis (Supports Unicode, <:name:id>, name:id, or raw ID)
reactions:
  queued: "⏳"
  in_progress: "⚙️"
  responded: "💬"
  awaiting_plan_approval: "📋"
  completed: "✅"
  failed: "❌"

# Optional Guild-specific mappings (Overrides database slash command configuration)
guilds: {}
  # "YOUR_GUILD_ID":
  #   default_repo: "owner/repo"
  #   forum_channel_id: "YOUR_FORUM_CHANNEL_ID"

# Auto-reject proposed plans once per session
auto_reject:
  enabled: false
  message: "Please do not create or refine an implementation plan. Respond directly to the previous prompt and do not try to refine the implementation plan."

# Force interactive repository and branch selection on thread creation.
# If true, shows an embed with select menus allowing developers to pick a connected repo and branch.
# If false, automatically proceeds with default repository and branch.
interactive_selection: false

# Messages starting with this prefix will be completely ignored by the bot (e.g. "!")
ignore_prefix: ""

# Bot Presence Configuration
presence:
  status: "online" # online, idle, dnd, invisible
  activity: "Diagnostic Logs"
  activity_type: "Watching" # Playing, Watching, Listening, Competing, Streaming, Custom
  # url: "https://twitch.tv/..." # Required for Streaming type

# Pre-warmed session pool configuration (opt-in)
pre_warmed_sessions:
  enabled: false
  pool_size: 1
  # Optional: Instructions sent only to pre-warmed sessions during initialization.
  # Use this to give Jules background tasks or specific focus areas before the user connects.
  pre_warming_prompt: |
    You are a diagnostic assistant. The user is connecting and has just sent their initial response. 
    Acknowledge that you are showing this message now that they have replied. 
    Share an extremely obscure, niche, or lesser-known Pokémon trivia fact (avoiding common, generic facts), and let them know you are actively analyzing the codebase and working on their query right now. 
    Even though you don't see their query yet, respond as if you have received a query from the user and are working on it.
    Do NOT propose code changes yet; generate the initial plan to welcome them and begin investigation.

# Optional Channel and Thread-specific Overrides
# You can override any global configuration options (e.g., diagnostic_prompt, access_control, reactions, auto_reject)
# at the Channel ID level or Thread ID level.
# channels:
#   "YOUR_CHANNEL_OR_FORUM_ID": # Channel or Forum ID
#     diagnostic_prompt: |
#       You are a diagnostic assistant. Please write extremely concise replies.
#     access_control:
#       allow_all: true
#     auto_reject:
#       enabled: true
#       message: "Plan automatically rejected for this forum channel."
#     reactions:
#       queued: "⏳"
#       in_progress: "⚙️"

# Optional Role-specific Overrides
# Overrides configuration options based on the roles of the thread creator.
# When a thread creator has a matching role, the overrides are applied to that thread's session.
# For example, if a Developer starts a thread, you can restrict access to only Developers:
# roles:
#   "Developer": # Role Name or Role ID
#     access_control:
#       allow_all: false
#       allowed_roles:
#         - "Developer"
#         - "Admin"
#     diagnostic_prompt: |
#       You are a technical assistant. Provide deep code explanations.

# Customizable text strings
# Every user-facing string (and the substantive Jules-prompt fragments) lives in
# `src/strings.ts` as the default. Override any of them here — you only need to
# list the keys you want to change; everything else falls back to the defaults.
# Templated strings use {placeholder} tokens (e.g. {emoji}, {repo}, {branch},
# {error}, {feedback}); keep the placeholders you need in your override.
#
# Like the other settings above, `messages:` can also be nested under a specific
# channel/forum (`channels:`) or role (`roles:`) block to override strings only
# in that context. The precedence is: defaults -> global -> channel -> thread -> role.
#
# messages:
#   errors:
#     no_permission_session: "🚫 Sorry, you can't use this diagnostic session."
#   session:
#     initializing: "{emoji} Spinning up Jules against `{repo}` (`{branch}`)…"
#     prewarmed_ready: "⚡ Got a warm session — on it!"
#   plan:
#     approve_button: "Looks good ✅"
#     reject_button: "Not quite ❌"
#   stream:
#     completed: "✅ All done!"
#   # See src/strings.ts for the full list of keys you can override.


